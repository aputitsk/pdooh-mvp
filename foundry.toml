[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["node_modules"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = [
  "@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/"
]

[rpc_endpoints]
arc_testnet = "https://rpc.testnet.arc.network"
